<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusChat — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="vendor/altcha/altcha.css" />
  <script type="module" src="vendor/altcha/altcha.js"></script>
</head>

<body>
  <div id="loginWrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <div>
          <div class="login-logo-text">Campus<span>Chat</span></div>
          <div class="login-subtitle">INTRANET MESSAGING</div>
        </div>
      </div>

      <!-- Fields -->
      <div class="field-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter your username" autocomplete="username" />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="password-field">
          <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="password-toggle" aria-label="Show password" data-target="password">
            <svg class="icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg class="icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.94" />
              <path d="M1 1l22 22" />
              <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24" />
              <path d="M14.12 14.12a3 3 0 0 0-4.24-4.24" />
              <path d="M23 12s-1.67 3.11-4.59 5.59" />
            </svg>
          </button>
        </div>
      </div>

      <altcha-widget id="altchaWidget" hidelogo hidefooter></altcha-widget>

      <button class="btn-primary" onclick="doLogin()">Sign In</button>
      <p id="loginError"></p>

      <p class="login-footer-text">
        <a href="forgot-password.html">Forgot your password?</a>
      </p>
      <p class="login-footer-text">
        Don't have an account?
        <a href="register.html">Register here</a>
      </p>

      <div class="theme-toggle-row">
        <button class="theme-btn" id="themeSun" aria-label="Light mode">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="theme-btn" id="themeMoon" aria-label="Dark mode">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <script>
    // ── Theme ──────────────────────────────────────
    function applyTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      localStorage.setItem("cc_theme", t);
      const sun = document.getElementById("themeSun");
      const moon = document.getElementById("themeMoon");
      if (sun) sun.classList.toggle("active", t === "light");
      if (moon) moon.classList.toggle("active", t === "dark");
    }
    (function () { applyTheme(localStorage.getItem("cc_theme") || "light"); })();
    document.getElementById("themeSun").addEventListener("click", () => applyTheme("light"));
    document.getElementById("themeMoon").addEventListener("click", () => applyTheme("dark"));

    // ── Config ─────────────────────────────────────
    const _host = window.location.hostname;
    const API_BASE = `http://${_host}/campus-chat/api/index.php`;
    const WS_URL = `http://${_host}:3001`;
    document.getElementById("altchaWidget").setAttribute(
      "challengeurl", `${API_BASE}/altcha/challenge?scope=login`
    );
    let _altchaPayload = "";
    document.getElementById("altchaWidget").addEventListener("statechange", ev => {
      _altchaPayload = ev.detail?.state === "verified" ? (ev.detail.payload || "") : "";
    });

    // ── Password toggle ────────────────────────────
    document.querySelectorAll(".password-toggle").forEach(btn => {
      const input = document.getElementById(btn.dataset.target);
      if (!input) return;
      btn.addEventListener("click", () => {
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        btn.classList.toggle("is-visible", show);
        btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
      });
    });

    // ── Show redirect message (e.g. session expired) ──
    const _msg = sessionStorage.getItem("cc_login_msg");
    if (_msg) {
      document.getElementById("loginError").textContent = _msg;
      sessionStorage.removeItem("cc_login_msg");
    }

    // ── Enter key ──────────────────────────────────
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    // ── Login ──────────────────────────────────────
    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errEl = document.getElementById("loginError");
      errEl.textContent = "";

      if (!username || !password) {
        errEl.textContent = "Please enter your username and password.";
        return;
      }

      if (!_altchaPayload) {
        errEl.textContent = "Please complete the CAPTCHA verification.";
        return;
      }

      const btn = document.querySelector(".btn-primary");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, altcha: _altchaPayload }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || "Login failed.";
          return;
        }

        // Save session
        localStorage.setItem("cc_token", data.access_token);
        localStorage.setItem("cc_user", JSON.stringify(data.user));
        localStorage.setItem("cc_ws_url", data.ws_url || WS_URL);

        // Redirect — force password change if flagged
        window.location.href = data.force_change ? "change-password.html" : "index.html";

      } catch (err) {
        errEl.textContent = "Connection error. Is the server running?";
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }
  </script>
</body>

</html>
