<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusChat — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="vendor/altcha/altcha.css" />
</head>

<body>
  <div id="loginWrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <div>
          <div class="login-logo-text">Campus<span>Chat</span></div>
          <div class="login-subtitle">INTRANET MESSAGING</div>
        </div>
      </div>

      <!-- Fields -->
      <div class="field-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter your username" autocomplete="username" />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="password-field">
          <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="password-toggle" aria-label="Show password" data-target="password">
            <svg class="icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg class="icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.94" />
              <path d="M1 1l22 22" />
              <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24" />
              <path d="M14.12 14.12a3 3 0 0 0-4.24-4.24" />
              <path d="M23 12s-1.67 3.11-4.59 5.59" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field-group" style="margin-top: 12px; display: flex; justify-content: center;">
        <altcha-widget id="loginAltcha" auto="off" hidelogo hidefooter
          style="display:block;max-width:100%;"></altcha-widget>
      </div>

      <button class="btn-primary" onclick="doLogin()">Sign In</button>
      <p id="loginError"></p>

      <p class="login-footer-text">
        <a href="forgot-password.html">Forgot username/password?</a>
      </p>
      <p class="login-footer-text">
        Don't have an account?
        <a href="register.html">Register here</a>
      </p>

      <div class="login-theme-toggle" role="group" aria-label="Theme toggle">
        <button type="button" class="theme-toggle-btn" id="loginThemeLightBtn" onclick="setLoginTheme('light')"
          aria-label="Switch to light theme" title="Light theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
        <button type="button" class="theme-toggle-btn" id="loginThemeDarkBtn" onclick="setLoginTheme('dark')"
          aria-label="Switch to dark theme" title="Dark theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>

    </div>
  </div>

  <script type="module" src="vendor/altcha/altcha.js"></script>
  <script>
    // ── Theme ──────────────────────────────────────
    function updateLoginThemeButtons(theme) {
      const lightBtn = document.getElementById("loginThemeLightBtn");
      const darkBtn = document.getElementById("loginThemeDarkBtn");
      if (!lightBtn || !darkBtn) return;

      lightBtn.classList.toggle("is-active", theme === "light");
      darkBtn.classList.toggle("is-active", theme === "dark");
      lightBtn.setAttribute("aria-pressed", theme === "light" ? "true" : "false");
      darkBtn.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
    }

    function setLoginTheme(theme) {
      const nextTheme = theme === "dark" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", nextTheme);
      localStorage.setItem("cc_theme", nextTheme);
      updateLoginThemeButtons(nextTheme);
    }

    (function () {
      const t = localStorage.getItem("cc_theme") || "light";
      setLoginTheme(t);
    })();

    // ── Config ─────────────────────────────────────
    const _host = window.location.hostname || "localhost";
    const _protocol = window.location.protocol === "https:" ? "https:" : "http:";
    const API_BASE = `${_protocol}//${_host}/campus-chat/api/index.php`;
    const REQUEST_API_BASE = window.location.port === "3001"
      ? `${window.location.origin}/api`
      : API_BASE;
    const ALTCHA_API_BASE = REQUEST_API_BASE;
    const WS_URL = `${_protocol}//${_host}:3001`;
    const LOGIN_ALTCHA_SCOPE = "login";
    const ALTCHA_VERIFY_CALL_TIMEOUT_MS = 20000;
    const LOGIN_REQUEST_TIMEOUT_MS = 20000;

    function configureAltchaWidget(widgetId, scope) {
      const widget = document.getElementById(widgetId);
      if (!widget) return;
      widget.setAttribute("challengeurl", `${ALTCHA_API_BASE}/altcha/challenge?scope=${encodeURIComponent(scope)}`);
      widget.setAttribute("workerurl", new URL("vendor/altcha/worker.js", window.location.href).href);
      widget.setAttribute("verifyurl", `${ALTCHA_API_BASE}/altcha/verify-code`);
    }

    async function readAltchaPayload(widgetId) {
      const widget = document.getElementById(widgetId);
      if (!widget) return "";

      const readPayload = () => {
        const hidden = widget.querySelector('input[type="hidden"][name="altcha"]');
        return hidden ? String(hidden.value || "").trim() : "";
      };

      let payload = readPayload();
      if (payload) return payload;

      if (typeof widget.verify === "function") {
        try {
          await Promise.race([
            widget.verify(),
            new Promise((_, reject) => {
              setTimeout(() => reject(new Error("ALTCHA verify timeout")), ALTCHA_VERIFY_CALL_TIMEOUT_MS);
            }),
          ]);
        } catch (_err) {
          // The widget manages its own error state.
        }
        payload = readPayload();
      }
      return payload;
    }

    configureAltchaWidget("loginAltcha", LOGIN_ALTCHA_SCOPE);
      const LOGIN_REQUEST_TIMEOUT_MS = 20000;

    // ── Password toggle ────────────────────────────
    document.querySelectorAll(".password-toggle").forEach(btn => {
      const input = document.getElementById(btn.dataset.target);
      if (!input) return;
      btn.addEventListener("click", () => {
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        btn.classList.toggle("is-visible", show);
        btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
      });
    });

    // ── Show redirect message (e.g. session expired) ──
    const _msg = sessionStorage.getItem("cc_login_msg");
    if (_msg) {
      document.getElementById("loginError").textContent = _msg;
      sessionStorage.removeItem("cc_login_msg");
    }

    // ── Enter key ──────────────────────────────────
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    // ── Login ──────────────────────────────────────
    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errEl = document.getElementById("loginError");
      errEl.textContent = "";

      if (!username || !password) {
        errEl.textContent = "Please enter your username and password.";
        return;
      }

      const altcha = await readAltchaPayload("loginAltcha");
      if (!altcha) {
        errEl.textContent = "Please complete the security verification.";
        return;
      }

      const btn = document.querySelector(".btn-primary");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), LOGIN_REQUEST_TIMEOUT_MS);

        const res = await fetch(`${REQUEST_API_BASE}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, altcha }),
          signal: controller.signal,
        });
        clearTimeout(timeoutId);
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || "Login failed.";
          return;
        }

        // Save session
        localStorage.setItem("cc_token", data.access_token);
        localStorage.setItem("cc_user", JSON.stringify(data.user));
        localStorage.setItem("cc_ws_url", data.ws_url || WS_URL);

        // Redirect — force security setup takes priority, then password change
        if (data.force_security_setup) {
          window.location.href = "setup-security.html";
        } else if (data.force_change) {
          window.location.href = "change-password.html";
        } else {
          window.location.href = "index.html";
        }

      } catch (err) {
        if (err?.name === "AbortError") {
          errEl.textContent = "Login request timed out. Please try again.";
        } else {
          errEl.textContent = "Connection error. Is the server running?";
        }
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }
  </script>
</body>

</html>
