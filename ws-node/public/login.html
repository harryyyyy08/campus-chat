<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusChat — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div id="loginWrap">
      <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
          <div class="login-logo-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div>
            <div class="login-logo-text">Campus<span>Chat</span></div>
            <div class="login-subtitle">INTRANET MESSAGING</div>
          </div>
        </div>

        <!-- Fields -->
        <div class="field-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Enter your username" autocomplete="username" />
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="password-toggle" aria-label="Show password" data-target="password">
              <svg class="icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.94"/>
                <path d="M1 1l22 22"/>
                <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24"/>
                <path d="M14.12 14.12a3 3 0 0 0-4.24-4.24"/>
                <path d="M23 12s-1.67 3.11-4.59 5.59"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-primary" onclick="doLogin()">Sign In</button>
        <p id="loginError"></p>

        <p class="login-footer-text">
          Don't have an account?
          <a href="register.html">Register here</a>
        </p>

      </div>
    </div>

    <script>
      // ── Theme ──────────────────────────────────────
      (function() {
        const t = localStorage.getItem("cc_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      })();

      // ── Config ─────────────────────────────────────
      const _host   = window.location.hostname;
      const API_BASE = `http://${_host}/campus-chat/api/index.php`;
      const WS_URL   = `http://${_host}:3001`;

      // ── Password toggle ────────────────────────────
      document.querySelectorAll(".password-toggle").forEach(btn => {
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        btn.addEventListener("click", () => {
          const show = input.type === "password";
          input.type = show ? "text" : "password";
          btn.classList.toggle("is-visible", show);
          btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
        });
      });

      // ── Show redirect message (e.g. session expired) ──
      const _msg = sessionStorage.getItem("cc_login_msg");
      if (_msg) {
        document.getElementById("loginError").textContent = _msg;
        sessionStorage.removeItem("cc_login_msg");
      }

      // ── Enter key ──────────────────────────────────
      document.addEventListener("keydown", e => {
        if (e.key === "Enter") doLogin();
      });

      // ── Login ──────────────────────────────────────
      async function doLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const errEl    = document.getElementById("loginError");
        errEl.textContent = "";

        if (!username || !password) {
          errEl.textContent = "Please enter your username and password.";
          return;
        }

        const btn = document.querySelector(".btn-primary");
        btn.disabled    = true;
        btn.textContent = "Signing in…";

        try {
          const res  = await fetch(`${API_BASE}/login`, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (!res.ok) {
            errEl.textContent = data.error || "Login failed.";
            return;
          }

          // Save session
          localStorage.setItem("cc_token", data.access_token);
          localStorage.setItem("cc_user",  JSON.stringify(data.user));
          localStorage.setItem("cc_ws_url", data.ws_url || WS_URL);

          // Redirect to chat
          window.location.href = "index.html";

        } catch (err) {
          errEl.textContent = "Connection error. Is the server running?";
        } finally {
          btn.disabled    = false;
          btn.textContent = "Sign In";
        }
      }
    </script>
  </body>
</html>
