<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusChat — Change Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/login.css" />
  <style>
    .cp-notice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(234, 179, 8, 0.08);
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .cp-notice svg {
      flex-shrink: 0;
      margin-top: 1px;
      color: #eab308;
    }
  </style>
</head>

<body>
  <div id="loginWrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <div>
          <div class="login-logo-text">Campus<span>Chat</span></div>
          <div class="login-subtitle">INTRANET MESSAGING</div>
        </div>
      </div>

      <h2 style="font-size:17px;font-weight:700;color:var(--text-primary);margin:0 0 14px;">Set New Password</h2>

      <div class="cp-notice">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        You are using a temporary password. Please set a new password to continue.
      </div>

      <div class="field-group">
        <label for="newPassword">New Password</label>
        <div class="password-field">
          <input id="newPassword" type="password" placeholder="Minimum 8 characters" autocomplete="new-password" />
          <button type="button" class="password-toggle" aria-label="Show password" data-target="newPassword">
            <svg class="icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg class="icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.94" />
              <path d="M1 1l22 22" />
              <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24" />
              <path d="M14.12 14.12a3 3 0 0 0-4.24-4.24" />
              <path d="M23 12s-1.67 3.11-4.59 5.59" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field-group">
        <label for="confirmPassword">Confirm New Password</label>
        <div class="password-field">
          <input id="confirmPassword" type="password" placeholder="Re-enter new password" autocomplete="new-password" />
          <button type="button" class="password-toggle" aria-label="Show password" data-target="confirmPassword">
            <svg class="icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg class="icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.94" />
              <path d="M1 1l22 22" />
              <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24" />
              <path d="M14.12 14.12a3 3 0 0 0-4.24-4.24" />
              <path d="M23 12s-1.67 3.11-4.59 5.59" />
            </svg>
          </button>
        </div>
      </div>

      <p id="cpError" style="color:var(--error,#ef4444);font-size:13px;margin:0 0 12px;min-height:18px;"></p>
      <button class="btn-primary" onclick="changePassword()">Save New Password</button>

    </div>
  </div>

  <script>
    (function () {
      const t = localStorage.getItem("cc_theme") || "light";
      document.documentElement.setAttribute("data-theme", t);

      // Must have a valid token — if not, redirect to login
      const token = localStorage.getItem("cc_token");
      if (!token) {
        window.location.href = "login.html";
      }
    })();

    const _host = window.location.hostname || "localhost";
    const _protocol = window.location.protocol === "https:" ? "https:" : "http:";
    const API_BASE = `${_protocol}//${_host}/campus-chat/api/index.php`;

    // Password toggles
    document.querySelectorAll(".password-toggle").forEach(btn => {
      const input = document.getElementById(btn.dataset.target);
      if (!input) return;
      btn.addEventListener("click", () => {
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        btn.classList.toggle("is-visible", show);
        btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
      });
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") changePassword();
    });

    async function changePassword() {
      const newPass = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;
      const errEl = document.getElementById("cpError");
      errEl.textContent = "";

      if (newPass.length < 8) {
        errEl.textContent = "Password must be at least 8 characters.";
        return;
      }
      if (newPass !== confirm) {
        errEl.textContent = "Passwords do not match.";
        return;
      }

      const btn = document.querySelector(".btn-primary");
      btn.disabled = true;
      btn.textContent = "Saving…";

      try {
        const token = localStorage.getItem("cc_token");
        const res = await fetch(`${API_BASE}/change-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`,
          },
          body: JSON.stringify({ new_password: newPass, confirm_password: confirm }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || "Failed to change password.";
          return;
        }

        window.location.href = "index.html";
      } catch {
        errEl.textContent = "Connection error. Is the server running?";
      } finally {
        btn.disabled = false;
        btn.textContent = "Save New Password";
      }
    }
  </script>
</body>

</html>
