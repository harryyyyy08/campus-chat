<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusChat — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="vendor/altcha/altcha.css" />
  <script type="module" src="vendor/altcha/altcha.js"></script>
</head>

<body>
  <div id="registerWrap">

    <!-- Registration Form -->
    <div id="registerForm" class="login-card" style="max-width:440px;">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <div>
          <div class="login-logo-text">Campus<span>Chat</span></div>
          <div class="login-subtitle">CREATE ACCOUNT</div>
        </div>
      </div>

      <div class="field-group">
        <label for="reg_full_name">Full Name</label>
        <input id="reg_full_name" type="text" placeholder="e.g. Juan dela Cruz" />
      </div>

      <div class="field-group">
        <label for="reg_username">Username</label>
        <input id="reg_username" type="text" placeholder="e.g. jdelacruz" autocomplete="username" autocapitalize="off"
          spellcheck="false" />
        <div class="field-hint">Lowercase letters, numbers, underscores only</div>
      </div>

      <div class="field-group">
        <label for="reg_password">Password</label>
        <div class="password-field">
          <input id="reg_password" type="password" placeholder="At least 8 characters" />
          <button type="button" class="password-toggle" aria-label="Show password" data-target="reg_password">
            <svg class="icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg class="icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.94" />
              <path d="M1 1l22 22" />
              <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24" />
              <path d="M14.12 14.12a3 3 0 0 0-4.24-4.24" />
              <path d="M23 12s-1.67 3.11-4.59 5.59" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field-group">
        <label for="reg_password2">Confirm Password</label>
        <div class="password-field">
          <input id="reg_password2" type="password" placeholder="Repeat your password" />
          <button type="button" class="password-toggle" aria-label="Show password" data-target="reg_password2">
            <svg class="icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg class="icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.94" />
              <path d="M1 1l22 22" />
              <path d="M9.88 9.88a3 3 0 0 0 4.24 4.24" />
              <path d="M14.12 14.12a3 3 0 0 0-4.24-4.24" />
              <path d="M23 12s-1.67 3.11-4.59 5.59" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field-group">
        <label for="reg_role">I am a…</label>
        <select id="reg_role" class="field-select">
          <option value="student">Student</option>
          <option value="faculty">Faculty / Staff</option>
        </select>
      </div>

      <div class="field-group">
        <label for="reg_department">Department / Section</label>
        <select id="reg_department" class="field-select" required>
          <option value="">— Select Department —</option>
        </select>
      </div>

      <altcha-widget id="altchaRegWidget" hidelogo hidefooter></altcha-widget>

      <button class="btn-primary" onclick="submitRegistration()">Submit Registration</button>
      <p id="regError"></p>

      <p class="login-footer-text">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>
    </div>

    <!-- Success state -->
    <div id="registerSuccess" class="login-card hidden" style="max-width:440px;text-align:center;">
      <div class="reg-success-icon">✅</div>
      <div class="reg-success-title">Registration Submitted!</div>
      <div class="reg-success-sub">
        Your account is pending approval by an administrator.<br />
        You will be notified once your account is activated.
      </div>
      <a href="login.html" class="btn-primary"
        style="display:block;text-decoration:none;text-align:center;margin-top:0;">
        Back to Login
      </a>
    </div>

  </div>

  <style>
    .reg-success-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .reg-success-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .reg-success-sub {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }
  </style>

  <script>
    // ── Theme ──────────────────────────────────────
    (function () {
      const t = localStorage.getItem("cc_theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
    })();

    const _host = window.location.hostname;
    const API_BASE = `http://${_host}/campus-chat/api/index.php`;
    document.getElementById("altchaRegWidget").setAttribute(
      "challengeurl", `${API_BASE}/altcha/challenge?scope=register`
    );
    let _altchaPayload = "";
    document.getElementById("altchaRegWidget").addEventListener("statechange", ev => {
      _altchaPayload = ev.detail?.state === "verified" ? (ev.detail.payload || "") : "";
    });
    // ── Load departments into dropdown ──────────────
    (async function loadDepartments() {
      try {
        const res = await fetch(`${API_BASE}/departments`);
        const data = await res.json();
        if (res.ok && data.departments) {
          const sel = document.getElementById("reg_department");
          data.departments.forEach(d => {
            const opt = document.createElement("option");
            opt.value = String(d.id);
            opt.textContent = d.name;
            sel.appendChild(opt);
          });
        }
      } catch (err) {
        console.error("Failed to load departments:", err);
      }
    })();

    // ── Password toggles ───────────────────────────
    document.querySelectorAll(".password-toggle").forEach(btn => {
      const input = document.getElementById(btn.dataset.target);
      if (!input) return;
      btn.addEventListener("click", () => {
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        btn.classList.toggle("is-visible", show);
        btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
      });
    });

    // ── Enter key ──────────────────────────────────
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") submitRegistration();
    });

    // ── Username input sanitize (live) ─────────────
    const usernameInput = document.getElementById("reg_username");
    if (usernameInput) {
      usernameInput.addEventListener("input", () => {
        const rawValue = usernameInput.value;
        const cursor = usernameInput.selectionStart ?? rawValue.length;
        const beforeCursor = rawValue.slice(0, cursor);

        const sanitized = rawValue.toLowerCase().replace(/[^a-z0-9_]/g, "");
        const sanitizedBeforeCursor = beforeCursor.toLowerCase().replace(/[^a-z0-9_]/g, "");

        if (sanitized !== rawValue) {
          usernameInput.value = sanitized;
          usernameInput.setSelectionRange(sanitizedBeforeCursor.length, sanitizedBeforeCursor.length);
        }
      });
    }

    // ── Submit ─────────────────────────────────────
    async function submitRegistration() {
      const full_name = document.getElementById("reg_full_name").value.trim();
      const username = document.getElementById("reg_username").value.trim().toLowerCase();
      const password = document.getElementById("reg_password").value;
      const password2 = document.getElementById("reg_password2").value;
      const role = document.getElementById("reg_role").value;
      const department_id = Number(document.getElementById("reg_department").value || 0);
      const errEl = document.getElementById("regError");
      errEl.textContent = "";

      if (!full_name) { errEl.textContent = "Full name is required."; return; }
      if (!username) { errEl.textContent = "Username is required."; return; }
      if (!department_id) { errEl.textContent = "Please select a department."; return; }
      if (!/^[a-z0-9_]+$/.test(username)) { errEl.textContent = "Username: lowercase letters, numbers, underscores only."; return; }
      if (username.length < 3) { errEl.textContent = "Username must be at least 3 characters."; return; }
      if (password.length < 8) { errEl.textContent = "Password must be at least 8 characters."; return; }
      if (password !== password2) { errEl.textContent = "Passwords do not match."; return; }
      if (!_altchaPayload) { errEl.textContent = "Please complete the CAPTCHA verification."; return; }

      const btn = document.querySelector(".btn-primary");
      btn.disabled = true; btn.textContent = "Submitting…";

      try {
        const res = await fetch(`${API_BASE}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ full_name, username, password, role, department_id, altcha: _altchaPayload }),
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || "Registration failed."; return; }
        document.getElementById("registerForm").classList.add("hidden");
        document.getElementById("registerSuccess").classList.remove("hidden");
      } catch (err) {
        errEl.textContent = "Connection error. Is the server running?";
      } finally {
        btn.disabled = false; btn.textContent = "Submit Registration";
      }
    }
  </script>
</body>

</html>
