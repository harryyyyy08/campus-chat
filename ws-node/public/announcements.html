<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcements — CampusChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/announcements.css" />
</head>
<body>

<div id="app">

  <!-- ── Top Header ── -->
  <header class="ann-header">
    <div class="ann-header-left">

      <!-- Desktop only: back to chat -->
      <a href="index.html" class="ann-back-btn ann-back-desktop" title="Back to Chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>

      <!-- Mobile only: smart back (list → index.html, detail → list) -->
      <button class="ann-back-btn ann-back-mobile" onclick="handleMobileBack()" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="ann-header-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <span class="ann-header-title">Announcements</span>
    </div>
    <div class="ann-header-right">
      <button class="ann-compose-btn" id="composeBtn" title="New Announcement">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>New</span>
      </button>
    </div>
  </header>

  <!-- ── Main Layout ── -->
  <div class="ann-layout">

    <!-- Left: List Panel -->
    <aside class="ann-sidebar" id="annSidebar">
      <div class="ann-tabs">
        <button class="ann-tab active" data-filter="all">All</button>
        <button class="ann-tab" data-filter="unread">Unread</button>
        <button class="ann-tab" data-filter="mine">Mine</button>
        <button class="ann-tab admin-only hidden" data-filter="pending">
          Pending <span class="ann-pending-badge" id="pendingBadge"></span>
        </button>
      </div>

      <div class="ann-list" id="annList">
        <div class="ann-loading">Loading…</div>
      </div>
    </aside>

    <!-- Right: Detail Panel -->
    <main class="ann-detail" id="annDetail">
      <div class="ann-empty-state" id="annEmptyState">
        <span class="ann-empty-icon">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            <line x1="9" y1="12" x2="15" y2="12"/>
            <line x1="9" y1="16" x2="13" y2="16"/>
          </svg>
        </span>
        <p class="ann-empty-title">No announcement selected</p>
        <p class="ann-empty-sub">Pick one from the list to read it here</p>
      </div>
    </main>

  </div>
</div>

<!-- ── Persistent Announcement Modal ── -->
<div class="ann-persist-overlay hidden" id="annPersistOverlay" aria-hidden="true">
  <div class="ann-persist-card" role="dialog" aria-modal="true" aria-labelledby="annPersistTitle">
    <div class="ann-persist-header">
      <div class="ann-persist-pill">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:-1px">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        New Announcement
      </div>
    </div>
    <div class="ann-persist-title" id="annPersistTitle"></div>
    <div class="ann-persist-meta" id="annPersistMeta"></div>
    <div class="ann-persist-body" id="annPersistBody"></div>
    <div class="ann-persist-actions">
      <button class="ann-persist-btn-view" id="annPersistView">View Announcement</button>
      <button class="ann-persist-btn-ok" id="annPersistOk">Got it ✓</button>
    </div>
  </div>
</div>

<!-- ── Compose Modal ── -->
<div class="ann-modal-overlay hidden" id="composeModal">
  <div class="ann-modal">
    <div class="ann-modal-header">
      <h3 id="modalTitle">New Announcement</h3>
      <button class="ann-modal-close" id="closeModal" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="ann-modal-body">
      <input type="hidden" id="editingId" value="" />

      <label>Title</label>
      <input type="text" id="annTitle" placeholder="Announcement title…" maxlength="255" />

      <label>Body</label>
      <textarea id="annBody" rows="5" placeholder="Write your announcement…"></textarea>

      <div class="ann-form-row">
        <div>
          <label>Send to</label>
          <select id="annTarget">
            <option value="all">All Users</option>
            <option value="department">My Department</option>
          </select>
        </div>
      </div>

      <div class="ann-dept-row hidden" id="deptRow">
        <label>Department</label>
        <input type="text" id="annDept" placeholder="e.g. Computer Science" />
      </div>

      <div class="ann-pending-notice hidden" id="pendingNotice">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Your announcement will be reviewed by an admin before publishing.
      </div>
    </div>
    <div class="ann-modal-footer">
      <button class="ann-btn-cancel" id="cancelModal">Cancel</button>
      <button class="ann-btn-submit" id="submitAnn">Post Announcement</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="ann-toast hidden" id="annToast"></div>

<!-- ── Theme init ── -->
<script>
  (function() {
    const t = localStorage.getItem("cc_theme") || "light";
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>

<script src="js/config.js"></script>
<script src="js/announcements.js"></script>

<script>
  // ── Mobile navigation helpers ───────────────────

  function openMobileDetail() {
    if (window.innerWidth <= 700) {
      document.getElementById("annSidebar").classList.add("mobile-hidden");
      document.getElementById("annDetail").classList.add("mobile-open");
    }
  }

  function closeMobileDetail() {
    document.getElementById("annSidebar").classList.remove("mobile-hidden");
    document.getElementById("annDetail").classList.remove("mobile-open");
  }

  // Smart back: if detail is open → go back to list
  //             if list is showing → go back to index.html
  function handleMobileBack() {
    const detailOpen = document.getElementById("annDetail").classList.contains("mobile-open");
    if (detailOpen) {
      closeMobileDetail();
    } else {
      window.location.href = "index.html";
    }
  }

  // Patch selectAnnouncement to trigger mobile slide
  document.addEventListener("DOMContentLoaded", () => {
    const origSelect = window.selectAnnouncement;
    if (typeof origSelect === "function") {
      window.selectAnnouncement = function(id) {
        origSelect(id);
        openMobileDetail();
      };
    }
  });
</script>
</body>
</html>
